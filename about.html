<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">"
    <script src="/js/scripts.js"></script>
  </head>
<body>
  <div class="container">
    <header>
      <h1>My About Page</h1>
    </header>
    <section>
    <form method="post" action="https://webdevbasics.net/scripts/demo.php">
      <div class="mb-3">
        <label for="name" class="form-label">Name:</label>
        <input type="text" name="name" id="name" class="form-control">
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="text" name="email" id="email" class="form-control">
      </div>
      Choose the browsers you use:<br>
      <div class="mb-3" form-check>
        <input type="checkbox" name="go" id="go" value="yes" class="form-check-input">
        <label for="go" class="form-check-label">Google Chrome</label>
      </div>
      <div class="mb-3" form-check>
        <input type="checkbox" name="firefox" id="firefox" value="yes" class="form-check-input">
        <label for="firefox" class="form-check-label">Firefox</label><br>
      </div>
      <div class="mb-3" form-check>
        <input type="checkbox" name="edge" id="edge" value="yes" class="form-check-input">
        <label for="edge" class="form-check-label">Microsoft Edge</label>
      </div>
      Would you like to be on our mailing list:<br>
      <div class="mb-3">
        <div class="form-check">
          <input type="radio" name="mailingList" id="mailingListYes" value="yes"  class="form-check-input">
          <label for="mailingListYes" class="form-check-label">Yes</label><br>
        </div>  
        <div>
          <input type="radio" name="mailingList" id="mailingListNo" value="no"  class="form-check-input">
          <label for="mailingListNo" class="form-check-label">No</label>
        </div>
      </div>
      <div class="mb-3 input-group">
       <span span class="input-group-text">Your Comments:</span>
       <textarea class="form-control" aria-label="Comments"></textarea>
      </div>
      <input type="submit" value="Submit" class="btn btn-primary">
      <input type="reset" class="btn btn-secondary">
    </form>
  </section>
  </div>
</body>
</html>
