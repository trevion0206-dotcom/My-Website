<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
  </head>

  <body>
    <header>
      <h1>My About Page</h1>
    </header>
     <section>
      <form method="post" action="https://webdevbasics.net/scripts/demo.php">
        <div>
          <label for="name">Name:</label>
          <input type="text" name="name" id="name">
        </div>
        <div>
          <label for="email">Email:</label>
          <input type="text" name="email" id="email">
        </div>
        <div>
          Choose the browsers you use:<br>
          <input type="checkbox" name="go" id="go" value="yes">
          <label for="go">Google Chrome</label><br>

          <input type="checkbox" name="firefox" id="firefox" value="yes">
          <label for="firefox">Firefox</label><br>

          <input type="checkbox" name="edge" id="edge" value="yes">
          <label for="edge">Microsoft Edge</label>
        </div>
        <div>
          Would you like to be on our mailing list:<br>
          <input type="radio" name="mailingList" id="mailingListYes" value="yes">
          <label for="mailingListYes">Yes</label><br>

          <input type="radio" name="mailingList" id="mailingListNo" value="no">
          <label for="mailingListNo">No</label>
        </div>
      </div>
      <div>
       <span>Comments</span>
       <textarea ></textarea>
      </div>
      <input type="submit" value="Submit">
      <input type="reset">
    </form>
  </section>
</body>
</html>
